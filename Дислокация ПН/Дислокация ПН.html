<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дислокация вагонов ПН · Станция Новая</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <!-- ШАПКА -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v15M9 4v15"/><path d="M2 9.5h9M2 14.5h9"/><path d="M15 7l5 5-5 5"/></svg>
      </div>
      <div class="brand-name">Дислокация ПН</div>
    </div>
    <nav class="mainnav">
      <a class="active">Дислокация</a>
      <a href="Admin.html">Admin Panel</a>
      <a>Отчёты</a>
      <a>Сервисы</a>
      <a>Справка</a>
    </nav>
    <div class="topbar-right">
      <span class="greet">Здравствуйте, <b>user1</b></span>
      <a class="logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5M21 12H9"/></svg>Выйти</a>
    </div>
  </header>

  <!-- ТУЛБАР -->
  <div class="toolbar">
    <div class="station-select">
      <select id="stationSelect"></select>
    </div>
    <div class="search">
      <label>Поиск по номеру вагона</label>
      <div class="search-field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="searchInput" type="text" placeholder="напр. 76413830" inputmode="numeric">
      </div>
    </div>
    <button class="btn btn-primary" id="searchBtn">Поиск</button>
  </div>

  <!-- ТЕЛО -->
  <div class="body">

    <!-- Дерево -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="st"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="m2 17 10 5 10-5M2 12l10 5 10-5"/></svg>Пути и парки</span>
        <button class="refresh" id="refreshBtn" title="Обновить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
      </div>
      <div class="tree" id="tree"></div>
    </aside>

    <!-- Контент -->
    <main class="content">
      <div class="content-head" id="contentHead"></div>
      <div class="table-wrap" id="tableWrap"></div>
    </main>

    <!-- Заявки -->
    <section class="requests" id="requests">
      <div class="requests-head">
        <span class="title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5h13l3.5 7v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6z"/></svg>Заявки<span class="cnt" id="reqCount">0</span></span>
        <button class="add" id="reqAdd" title="Создать заявку"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
        <button class="collapse" id="reqCollapse" title="Свернуть"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14"/></svg></span></button>
      </div>
      <div class="requests-list" id="reqList"></div>
    </section>

  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
